{% extends 'base.html' %}


{% block content %}

            <div class="grid-container">
                {% for producto in productos %}
                <div class="card-container">
                    <div class="card-title">{{ producto.nombre }}</div>
                    <div>
                        <img class="card-img" src="{{ producto.imagen }}" alt="">
                    </div>
                    <div class="card-price">${{ producto.precio }}</div>
                    <div class="card-desc">{{ producto.descripcion }}</div>

                    {% if user %}
                        <!-- Esto solo se muestra si hay usuario logueado -->
                        <div>
                            <a href="{{ url_for('editar_producto', id=producto.id_producto) }}">Editar</a> |
                            <form action="/eliminarp/{{ producto.id_producto }}" method="POST" style="display:inline;">
                            <button type="submit">Eliminar</button>
                            </form>

                        </div>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

{% endblock %}
