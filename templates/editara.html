{% extends 'base.html' %}

{% block content %}
    <h1>Editar administrador</h1>
<form method="POST">
  <label>Nombre:</label>
  <input type="text" name="Nombre" value="{{ admin.nombre }}"><br>

  <label>Apellido:</label>
  <input type="text" name="Apellido" value="{{ admin.apellido }}"><br>

  <label>Teléfono:</label>
  <input type="text" name="Telefono" value="{{ admin.telefono }}"><br>

  <label>Email:</label>
  <input type="email" name="Email" value="{{ admin.email }}"><br>
  
  <label>Contraseña:</label>
  <input type="password" name="Password"><br>

  <button type="submit">Guardar cambios</button>
</form>
{% endblock %}
