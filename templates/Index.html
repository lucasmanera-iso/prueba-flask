<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>

    <header>
        <div class="header-container">
            <div class="search-container">
                <div class="logo-header">
                    <a href="/"><img src="/static/Image/file_00000000724861f5921807b71963460f.png" alt=""></a>
                </div>
                <div class="search">
                    <input type="text" placeholder="Buscar Productos">
                </div>
            </div>
            <div class="menu-container">
                <div><a href="/productos" >Productos</a></div>
                <div><a href="https://wa.link/85v4ds" >Contacto</a></div>
                {% if usuarios %}
                <div id="profile-logo" class="profile-logo">
                    <img src="https://imgs.search.brave.com/FOrjj-LAZECzR2vyFNpfW6DE4UrfNIdP43418R-_RiA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuc2Vla2xvZ28u/Y29tL2xvZ28tcG5n/LzI3LzIvdXNlci1s/aW5lLWxvZ28tcG5n/X3NlZWtsb2dvLTI3/MjU4MS5wbmc" alt="">
                    <div id="menu-desplegable" class="menu-desplegable">
                        <a href="/administradores">Perfil</a>
                        <a href="/subir">Subir productos</a>
                    </div>
                </div>
                {% else %}
                <div><a href="/login">Ingresar</a></div>
                {% endif %}

            </div>
        </div>
    </header>


    <main>

  <div>
    <h2>Novedades</h2>
    <div class="carrusel" id="carrusel-novedades">
      <button class="restar">-</button>
      <div class="producto"></div>
      <button class="sumar">+</button>
    </div>

    <h2>Más vendidos</h2>
    <div class="carrusel" id="carrusel-mas-vendidos">
      <button class="restar">-</button>
      <div class="producto"></div>
      <button class="sumar">+</button>
    </div>

    <h2>Shampoos</h2>
    <div class="carrusel" id="carrusel-shampoo">
      <button class="restar">-</button>
      <div class="producto"></div>
      <button class="sumar">+</button>
    </div>
  </div>



        


        <div id="data"
            data-novedades='{{ novedades|tojson|safe }}'
            data-masvendidos='{{ mas_vendidos|tojson|safe }}'
            data-shampoo='{{ shampoo|tojson|safe }}'>
        </div>

 


    </main>
    

    <footer>

    </footer>
        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
<script src="/static/Js/menu_desplegable.js"></script>
</html>
