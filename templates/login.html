<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>
    

    <header>
        <div class="header-container">
            <div class="search-container">
                <div class="logo-header">
                    <a href="/"><img src="/static/Image/file_00000000724861f5921807b71963460f.png" alt=""></a>
                </div>
                <div class="search">
                    <input type="text" placeholder="Buscar Productos">
                </div>
            </div>
            <div class="menu-container">
                <div><a href="/productos" >Productos</a></div>
                <div><a href="https://wa.link/85v4ds" >Contacto</a></div>
                <div class="profile-logo"><a href="/administradores"><img src="https://imgs.search.brave.com/FOrjj-LAZECzR2vyFNpfW6DE4UrfNIdP43418R-_RiA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuc2Vla2xvZ28u/Y29tL2xvZ28tcG5n/LzI3LzIvdXNlci1s/aW5lLWxvZ28tcG5n/X3NlZWtsb2dvLTI3/MjU4MS5wbmc" alt=""></a></div>
            </div>
        </div>
    </header>


    <main>

        {% if mensaje %}
        <p>{{ mensaje }}</p>
        {% endif %}

        <form action="" method="post" class="form-insert">
            <h2>Iniciar Sesion</h2>
            <label for="Nombre">Ingrese Su Correo Electronico</label>
            <input type="email" name="Email" placeholder="alguien123@email.com">
            <label for="password">Ingrese su Contraseña</label>
            <input type="password" name="password" placeholder="Contraseña">
            <button type="submit">Logear</button>
        </form>
    </main>
</body>
</html>
