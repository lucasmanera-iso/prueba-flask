<!DOCTYPE html>
<html lang="en">

<body>
    <h1>Editar administrador</h1>
<form method="POST">
  <label>Nombre:</label>
  <input type="text" name="Nombre" value="{{ admin.Nombre }}"><br>

  <label>Apellido:</label>
  <input type="text" name="Apellido" value="{{ admin.Apellido }}"><br>

  <label>Teléfono:</label>
  <input type="text" name="Telefono" value="{{ admin.Telefono }}"><br>

  <label>Email:</label>
  <input type="email" name="Email" value="{{ admin.Email }}"><br>

  <button type="submit">Guardar cambios</button>
</form>

    
</body>
</html>
