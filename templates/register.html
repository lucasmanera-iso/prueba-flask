<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    {% if mensaje %}
        <p>{{ mensaje }}</p>
    {% endif %}

    <form method="post" class="form-insert">
        <h2>Registrar a nuevo administrador</h2>
        <label for="Nombre">Nombre</label>
        <input type="text" name="Nombre" placeholder="Nombre" required>
        <label for="Apellido">Apellido</label>
        <input type="text" name="Apellido" placeholder="Apellido" required>
        <label for="Telefono">Telefono</label>
        <input type="number" name="Telefono" placeholder="Numero Telefonico" required>
        <label for="Email">Correo Electronico</label>
        <input type="email" name="Email" placeholder="Email" required>
        <label for="password">Contraseña</label>
        <input type="password" name="psw" placeholder="Contraseña" required>
        <button type="submit">Registrar</button>
    </form>
</body>
</html>
