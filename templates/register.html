<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="search-container">
                <div class="logo-header">
                    <a href="/"><img src="/static/Image/file_00000000724861f5921807b71963460f.png" alt=""></a>
                </div>
                <div class="search">
                    <input type="text" placeholder="Buscar Productos">
                </div>
            </div>
            <div class="menu-container">
                <div><a href="/productos" >Productos</a></div>
                <div><a href="https://wa.link/85v4ds" >Contacto</a></div>
                <div class="profile-logo"><a href="/administradores"><img src="https://imgs.search.brave.com/FOrjj-LAZECzR2vyFNpfW6DE4UrfNIdP43418R-_RiA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuc2Vla2xvZ28u/Y29tL2xvZ28tcG5n/LzI3LzIvdXNlci1s/aW5lLWxvZ28tcG5n/X3NlZWtsb2dvLTI3/MjU4MS5wbmc" alt=""></a></div>
            </div>
        </div>
    </header>


    {% if mensaje %}
        <p>{{ mensaje }}</p>
    {% endif %}

    <form method="post" class="form-insert">
        <h2>Registrar a nuevo administrador</h2>
        <label for="Nombre">Nombre</label>
        <input type="text" name="Nombre" placeholder="Nombre" required>
        <label for="Apellido">Apellido</label>
        <input type="text" name="Apellido" placeholder="Apellido" required>
        <label for="Telefono">Telefono</label>
        <input type="number" name="Telefono" placeholder="Numero Telefonico" required>
        <label for="Email">Correo Electronico</label>
        <input type="email" name="Email" placeholder="Email" required>
        <label for="password">Contraseña</label>
        <input type="password" name="psw" placeholder="Contraseña" required>
        <button type="submit">Registrar</button>
    </form>
</body>
</html>
