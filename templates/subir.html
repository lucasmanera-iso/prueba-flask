<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="search-container">
                <div class="logo-header">
                    <a href="/"><img src="/static/Image/file_00000000724861f5921807b71963460f.png" alt=""></a>
                </div>
                <div class="search">
                    <input type="text" placeholder="Buscar Productos">
                </div>
            </div>
            <div class="menu-container">
                <div><a href="/productos" >Productos</a></div>
                <div><a href="/contactos" >Contacto</a></div>
                <div class="profile-logo"><a href="/administradores"><img src="https://imgs.search.brave.com/FOrjj-LAZECzR2vyFNpfW6DE4UrfNIdP43418R-_RiA/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pbWFn/ZXMuc2Vla2xvZ28u/Y29tL2xvZ28tcG5n/LzI3LzIvdXNlci1s/aW5lLWxvZ28tcG5n/X3NlZWtsb2dvLTI3/MjU4MS5wbmc" alt=""></a></div>
            </div>
        </div>
    </header>

    <main>
            <form action="/subir" method="POST" enctype="multipart/form-data" class="form-insert">
            <h2>Subir Producto</h2>
            <label for="name">Ingrese el nombre del producto</label>
            <input type="text" name="nombre" placeholder="Shampo SuperLimpio 375ml">
            <label for="marca">Marca del producto</label>
            <input type="text" name="marca" placeholder="Coalix">
            <label for="descripcion">Ingrese Descripcion del producto</label>
            <input type="text" name="descripcion" placeholder="Shampo ideal para cabellos rizos">
            <label for="precio">Precio</label>
            <input type="text" name="precio" placeholder="5000">
            <label for="contenido">contenido</label>
            <input type="text" name="contenido" placeholder="375ml">
            <label for="stock">Stock</label>
            <input type="text" name="stock" placeholder="1 o 0">
            <label for="imagen">Subir una imagen del producto</label>
            <input type="file" name="imagen" accept="image/*">
            <label for="categoria">Seleccione categoria</label>
            <input type="text" name="categoria">

            <button type="submit">Subir</button>
        </form>

    </main>
    <footer>

    </footer>
</body>
</html>
