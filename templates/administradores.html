<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Administradores</h1>
<div class="admins-container">
  {% for admin in administradores %}
    <div class="admin-card">
      <h3>{{ admin.nombre }} {{ admin.apellido }}</h3>
      <p>Email: {{ admin.email }}</p>
      <p>Teléfono: {{ admin.telefono }}</p>
      <p>Contraseña: {{admin.psw}}</p>
      <a href="{{ url_for('editar_admin', id=admin.id_usuario) }}">✏️ Editar</a>
    </div>
  {% endfor %}
</div>

<style>
.admins-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
  margin-top: 20px;
}
.admin-card {
  border: 1px solid #ccc;
  padding: 16px;
  border-radius: 8px;
  background: #f9f9f9;
}
.admin-card h3 {
  margin: 0 0 8px;
}
.admin-card a {
  margin-right: 10px;
  text-decoration: none;
  color: blue;
}
</style>

</body>
</html>
